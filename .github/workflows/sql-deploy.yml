name: Deploy SQL Database

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Database Project
      run: |
        $msbuildPath = (Get-ChildItem "C:\Program Files\Microsoft Visual Studio", "C:\Program Files (x86)\Microsoft Visual Studio" -Recurse -Filter "MSBuild.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
        
        if (-not $msbuildPath) {
            Write-Error "MSBuild not found."
            exit 1
        }
        
        & $msbuildPath "DatabaseTeacher/DatabaseTeacher.sqlproj" /p:Configuration=Release /t:Build

    - name: Publish to SQL Server
      run: |
        $sqlPackagePath = "C:\Program Files\Microsoft SQL Server\170\DAC\bin\SqlPackage.exe"
        
        if (-not (Test-Path $sqlPackagePath)) {
            $sqlPackagePath = (Get-ChildItem "C:\Program Files\Microsoft SQL Server", "C:\Program Files (x86)\Microsoft SQL Server" -Recurse -Filter "SqlPackage.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
        }

        if (-not (Test-Path $sqlPackagePath)) {
            Write-Error "SqlPackage.exe not found."
            exit 1
        }
        
        $dacpacPath = "DatabaseTeacher/bin/Release/DatabaseTeacher.dacpac"
        if (-not (Test-Path $dacpacPath)) {
            Write-Error "Dacpac file not found."
            exit 1
        }

        # Исправленная команда с TrustServerCertificate
        & $sqlPackagePath /Action:Publish /SourceFile:$dacpacPath /TargetDatabaseName:teacher /TargetServerName:"SLAVKA-ASUS\SLAVKASQLEXPRESS" /p:BlockOnPossibleDataLoss=False /p:TrustServerCertificate=True
