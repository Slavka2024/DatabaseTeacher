name: Deploy SQL Database

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Database Project
      # Используем MSBuild для сборки SQL проекта
      run: |
        # Ищем MSBuild (ищет в Program Files и Program Files (x86))
        $msbuildPath = (Get-ChildItem "C:\Program Files\Microsoft Visual Studio", "C:\Program Files (x86)\Microsoft Visual Studio" -Recurse -Filter "MSBuild.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
        
        if (-not $msbuildPath) {
            Write-Error "MSBuild not found. Please install Visual Studio Build Tools or SSDT."
            exit 1
        }
        
        Write-Host "Found MSBuild at: $msbuildPath"
        & $msbuildPath "DatabaseTeacher/DatabaseTeacher.sqlproj" /p:Configuration=Release /t:Build

    - name: Publish to SQL Server
      run: |
        # Путь к SqlPackage (стандартный для DacFramework.msi v170)
        $sqlPackagePath = "C:\Program Files\Microsoft SQL Server\170\DAC\bin\SqlPackage.exe"
        
        # Если не нашли в стандартной папке, ищем рекурсивно
        if (-not (Test-Path $sqlPackagePath)) {
            Write-Host "Standard path not found, searching..."
            $sqlPackagePath = (Get-ChildItem "C:\Program Files\Microsoft SQL Server", "C:\Program Files (x86)\Microsoft SQL Server" -Recurse -Filter "SqlPackage.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
        }

        if (-not (Test-Path $sqlPackagePath)) {
            Write-Error "SqlPackage.exe not found. Please install DacFramework."
            exit 1
        }

        Write-Host "Found SqlPackage at: $sqlPackagePath"
        
        $dacpacPath = "DatabaseTeacher/bin/Release/DatabaseTeacher.dacpac"
        if (-not (Test-Path $dacpacPath)) {
            Write-Error "Dacpac file not found at $dacpacPath. Build might have failed."
            exit 1
        }

        # Запуск публикации
        # /TargetEncrypt:False — решает проблему с SSL сертификатами
        # /p:BlockOnPossibleDataLoss=False — разрешает обновление структуры БД
        & $sqlPackagePath /Action:Publish /SourceFile:$dacpacPath /TargetDatabaseName:teacher /TargetServerName:"SLAVKA-ASUS\SLAVKASQLEXPRESS" /TargetEncrypt:False /p:BlockOnPossibleDataLoss=False
