name: Deploy SQL Database

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Database Project
      # Используем MSBuild вместо dotnet, так как это SQL проект
      run: |
        # Ищем MSBuild (обычно он есть, если установлен Visual Studio или Build Tools)
        $msbuildPath = (Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "MSBuild.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
        if (-not $msbuildPath) {
            Write-Error "MSBuild not found. Please install Visual Studio Build Tools or SSDT."
            exit 1
        }
        & $msbuildPath "DatabaseTeacher/DatabaseTeacher.sqlproj" /p:Configuration=Release

    - name: Publish to SQL Server
      # Используем SqlPackage для публикации
      run: |
        # Получаем путь к SqlPackage (он ставится вместе с SSDT)
        $sqlPackagePath = (Get-ChildItem "C:\Program Files\Microsoft SQL Server" -Recurse -Filter "SqlPackage.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
        if (-not $sqlPackagePath) {
            Write-Error "SqlPackage.exe not found. Please install SQL Server Data Tools (SSDT)."
            exit 1
        }
        
        $dacpacPath = "DatabaseTeacher/bin/Release/DatabaseTeacher.dacpac"
        if (-not (Test-Path $dacpacPath)) {
            Write-Error "Dacpac file not found at $dacpacPath"
            exit 1
        }

        & $sqlPackagePath /Action:Publish /SourceFile:$dacpacPath /TargetDatabaseName:teacher /TargetServerName:"SLAVKA-ASUS\SLAVKASQLEXPRESS" /p:BlockOnPossibleDataLoss=False
